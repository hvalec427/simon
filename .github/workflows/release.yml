name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Read version from package.json
        id: version
        run: echo "value=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Bundle
        run: npm run bundle

      - name: Build arm64 binary
        run: npx pkg bundle.cjs --target node22-macos-arm64 --output simon-darwin-arm64

      - name: Build x64 binary
        run: npx pkg bundle.cjs --target node22-macos-x64 --output simon-darwin-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            simon-darwin-arm64
            simon-darwin-x64
